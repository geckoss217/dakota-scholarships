          ...s,
          tracking: tracking[s.id] || {
            status: 'not-started',
            started: false,
            submitted: false,
            heardBack: false,
            result: ''
          }
        }));

        setLoading(false);
        setScholarships(withTracking);
        setFilteredScholarships(withTracking);
      }, []);

      // Save tracking data to localStorage
      const updateTracking = (id, updates) => {
        const updated = scholarships.map(s => 
          s.id === id ? { ...s, tracking: { ...s.tracking, ...updates } } : s
        );
        setScholarships(updated);
        setFilteredScholarships(updated);
        
        const tracking = {};
        updated.forEach(s => {
          tracking[s.id] = s.tracking;
        });
        localStorage.setItem('dakotaScholarshipTracking', JSON.stringify(tracking));
      };

        let filtered = scholarships.filter(s => {
          const matchesSearch = s.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
            s.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
            s.organization.toLowerCase().includes(searchTerm.toLowerCase());
          
          const matchesType = selectedFilters.type === 'all' || s.type === selectedFilters.type;
          const matchesAmount = s.amount >= selectedFilters.minAmount;
          const matchesRenewable = selectedFilters.renewable === 'all' || 
            (selectedFilters.renewable === 'yes' && s.renewable) ||
            (selectedFilters.renewable === 'no' && !s.renewable);
          const matchesStatus = selectedFilters.status === 'all' || s.tracking.status === selectedFilters.status;

          return matchesSearch && matchesType && matchesAmount && matchesRenewable && matchesStatus;
        });

          if (sortBy === 'deadline') {
            return new Date(a.deadline) - new Date(b.deadline);
          } else if (sortBy === 'amount-high') {
            return b.amount - a.amount;
          } else if (sortBy === 'amount-low') {
            return a.amount - b.amount;
          }
          return 0;
        });

        setFilteredScholarships(filtered);

                    className="bg-slate-800/40 border border-slate-700/50 rounded-xl overflow-hidden hover:border-emerald-500/30 hover:bg-slate-800/60 transition-all duration-200 group"
                  >
                    <button
                      onClick={() => setExpandedId(expandedId === scholarship.id ? null : scholarship.id)}
                      className="w-full p-6 text-left"
                    >
                      <div className="flex items-start justify-between gap-4">
                        <div className="flex-1 min-w-0">
                          <h3 className="text-xl font-bold text-white group-hover:text-emerald-400 transition-colors">
                            {scholarship.name}
                          </h3>
                          <p className="text-slate-400 text-sm mt-1">{scholarship.organization}</p>
                        </div>
                        <ChevronDown className={`flex-shrink-0 transition-transform duration-200 ${
                          expandedId === scholarship.id ? 'rotate-180' : ''
                        }`} />
                      </div>

                      {/* Quick Stats */}
                      <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mt-4">
                        <div className="flex items-center gap-2">
                          <DollarSign className="h-4 w-4 text-emerald-400" />
                          <span className="text-white font-semibold text-sm">${scholarship.amount.toLocaleString()}</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <Calendar className="h-4 w-4 text-blue-400" />
                          <span className="text-slate-300 text-sm">{formatDate(scholarship.deadline)}</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className={`px-2 py-1 rounded text-xs font-medium whitespace-nowrap ${
                            scholarship.renewable ? 'bg-emerald-500/20 text-emerald-300' : 'bg-slate-600/50 text-slate-300'
                          }`}>
                            {scholarship.renewable ? 'Renewable' : 'One-Time'}
                          </span>
                        </div>
                        <div className="text-right">
                          <span className={`text-xs font-medium ${
                            daysUntilDeadline(scholarship.deadline) > 60 ? 'text-emerald-400' :
                            daysUntilDeadline(scholarship.deadline) > 30 ? 'text-yellow-400' :
                            daysUntilDeadline(scholarship.deadline) > 0 ? 'text-orange-400' :
                            'text-red-400'
                          }`}>
                            {daysUntilDeadline(scholarship.deadline) > 0 ? daysUntilDeadline(scholarship.deadline) + ' days' : 'PASSED'}
                          </span>
                        </div>
                        <div>
                          <span className={`px-2 py-1 rounded text-xs font-medium whitespace-nowrap block ${statusInfo.bg} ${statusInfo.text}`}>
                            {statusInfo.label}
                          </span>
                        </div>
                      </div>
                    </button>

                    {/* Expanded Details */}
                    {expandedId === scholarship.id && (
                      <div className="border-t border-slate-700/50 bg-slate-900/30 p-6 space-y-6 animate-in">
                        <p className="text-slate-300">{scholarship.description}</p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div>
                            <h4 className="text-sm font-semibold text-slate-300 mb-2 flex items-center gap-2">
                              <Users className="h-4 w-4" />
                              Eligibility
                            </h4>
                            <p className="text-slate-400 text-sm">{scholarship.eligibility}</p>
                          </div>

                          <div>
                            <h4 className="text-sm font-semibold text-slate-300 mb-2 flex items-center gap-2">
                              <ClipboardList className="h-4 w-4" />
                              Requirements
                            </h4>
                            <ul className="text-slate-400 text-sm space-y-1">
                              {scholarship.requirements.essays > 0 && <li>• {scholarship.requirements.essays} essay(s)</li>}
                              {scholarship.requirements.documents > 0 && <li>• {scholarship.requirements.documents} documents</li>}
                              <li>• Minimum {scholarship.requirements.gpa} GPA</li>
                            </ul>
                          </div>
                        </div>

                        {/* Tracking Section */}
                        <div className="border-t border-slate-700/50 pt-6">
                          <h4 className="text-sm font-semibold text-slate-300 mb-4">Track Your Progress</h4>
                          <div className="space-y-3">
                            <label className="flex items-center gap-3 cursor-pointer">
                              <input
                                type="checkbox"
                                checked={scholarship.tracking.started}
                                onChange={(e) => {
                                  updateTracking(scholarship.id, {
                                    started: e.target.checked,
                                    status: e.target.checked ? 'in-progress' : 'not-started'
                                  });
                                }}
                                className="w-5 h-5 rounded border-slate-600 bg-slate-700 cursor-pointer accent-emerald-500"
                              />
                              <span className="text-slate-300 text-sm">Started application</span>
                            </label>

                            <label className="flex items-center gap-3 cursor-pointer">
                              <input
                                type="checkbox"
                                checked={scholarship.tracking.submitted}
                                onChange={(e) => {
                                  updateTracking(scholarship.id, {
                                    submitted: e.target.checked,
                                    status: e.target.checked ? 'submitted' : 'in-progress'
                                  });
                                }}
                                className="w-5 h-5 rounded border-slate-600 bg-slate-700 cursor-pointer accent-emerald-500"
                              />
                              <span className="text-slate-300 text-sm">Submitted</span>
                            </label>

                            <label className="flex items-center gap-3 cursor-pointer">
                              <input
                                type="checkbox"
                                checked={scholarship.tracking.heardBack}
                                onChange={(e) => {
                                  updateTracking(scholarship.id, {
                                    heardBack: e.target.checked,
                                    status: e.target.checked ? 'heard-back' : 'submitted'
                                  });
                                }}
                                className="w-5 h-5 rounded border-slate-600 bg-slate-700 cursor-pointer accent-emerald-500"
                              />
                              <span className="text-slate-300 text-sm">Heard back</span>
                            </label>

                            <div className="mt-4">
                              <label className="block text-sm font-medium text-slate-300 mb-2">Result</label>
                              <select
                                value={scholarship.tracking.result}
                                onChange={(e) => {
                                  const result = e.target.value;
                                  updateTracking(scholarship.id, {
                                    result: result,
                                    status: result === 'won' ? 'won' : result === 'rejected' ? 'rejected' : scholarship.tracking.status
                                  });
                                }}
                                className="w-full px-4 py-2 bg-slate-700/50 border border-slate-600 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                              >
                                <option value="">No result yet</option>
                                <option value="won">Won Award! 🎉</option>
                                <option value="rejected">Not Selected</option>
                                <option value="waitlisted">Waitlisted</option>
                              </select>
                            </div>
                          </div>
                        </div>

                        <a
                          href={scholarship.link}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="inline-flex items-center gap-2 mt-4 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium transition-colors"
                        >
                          Visit Organization <ExternalLink className="h-4 w-4" />
                        </a>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {filteredScholarships.length === 0 && (
              <div className="text-center py-12">
                <p className="text-slate-400 text-lg">No scholarships match your criteria. Try adjusting your filters!</p>
              </div>
            )}
          </main>

          {/* Footer */}
          <footer className="bg-slate-950/50 border-t border-slate-700/50 mt-20 py-8">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <p className="text-slate-400 text-sm text-center">
                Last updated: March 2026 • For Dakota Jackson • Track your progress automatically • Data saves to your device
              </p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ScholarshipFinder />);
  </script>
</body>
</html>
