        function getDaysDiff(deadline) {
            const today = new Date(2026, 2, 13); // March 13, 2026
            const deadlineDate = new Date(deadline);
            const diff = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
            return diff;
        }
        
        function getTierLabel(tier) {
            if (tier === "recommended") return "🎯 RECOMMENDED";
            return "🔍 ADDITIONAL";
        }
        
        function getTierColor(tier) {
            if (tier === "recommended") return "recommended-badge";
            return "additional-badge";
        }
        
        function getSelectivityTier(matchScore, odds) {
            if (matchScore >= 88 && odds <= 25) return { label: "Your Best Bet", class: "tier-best", icon: "🟢" };
            if (matchScore >= 80) return { label: "Worth Applying", class: "tier-medium", icon: "🟡" };
            return { label: "Reach Opportunity", class: "tier-reach", icon: "🔴" };
        }

                const saved = localStorage.getItem("scholarshipTracking");
                return saved ? JSON.parse(saved) : {};
            });
            
            React.useEffect(() => {
                localStorage.setItem("scholarshipTracking", JSON.stringify(tracking));
            }, [tracking]);

                let results = scholarships.filter(s => {
                    const matchesSearch = s.name.toLowerCase().includes(searchTerm.toLowerCase()) ||

                    const matchesAmount = s.amount >= minAmount;
                    const matchesTier = (showRecommended && s.tier === "recommended") || 
                                       (showAdditional && s.tier === "additional");
                    return matchesSearch && matchesAmount && matchesTier;
                });
                
                // Sort by days remaining, then by match score
                results.sort((a, b) => {
                    const daysA = getDaysDiff(a.deadline);
                    const daysB = getDaysDiff(b.deadline);
                    if (daysA > 0 && daysB <= 0) return -1;
                    if (daysA <= 0 && daysB > 0) return 1;
                    return b.matchScore - a.matchScore;
                });
                
                setFilteredScholarships(results);
            }, [searchTerm, minAmount, showRecommended, showAdditional]);

                    [id]: { ...prev[id], [field]: value }
                }));

                }));
            };

                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none transition"
                                />
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-6">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-3">
                                        Minimum Amount: ${minAmount.toLocaleString()}
                                    </label>
                                    <input
                                        type="range"
                                        min="0"
                                        max="30000"
                                        step="1000"
                                        value={minAmount}
                                        onChange={(e) => setMinAmount(parseInt(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="flex items-center gap-4">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={showRecommended}
                                            onChange={(e) => setShowRecommended(e.target.checked)}
                                            className="w-5 h-5 rounded border-gray-300"
                                        />
                                        <span className="text-sm font-medium text-gray-700">🎯 Recommended</span>
                                    </label>
                                </div>
                                
                                <div className="flex items-center gap-4">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={showAdditional}
                                            onChange={(e) => setShowAdditional(e.target.checked)}
                                            className="w-5 h-5 rounded border-gray-300"
                                        />
                                        <span className="text-sm font-medium text-gray-700">🔍 Additional</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Scholarships List */}
                    <div className="max-w-7xl mx-auto">
                        {filteredScholarships.length === 0 ? (
                            <div className="text-center py-12 bg-white rounded-2xl">
                                <p className="text-gray-500 text-lg">No scholarships match your filters.</p>
                            </div>
                        ) : (
                            <div className="grid gap-4">
                                {filteredScholarships.map((scholarship, idx) => {
                                    const t = tracking[scholarship.id] || {};
                                    const daysLeft = getDaysDiff(scholarship.deadline);
                                    const selectivityTier = getSelectivityTier(scholarship.matchScore, scholarship.odds);
                                    
                                    return (
                                        <div
                                            key={scholarship.id}
                                            className={`card-gradient rounded-2xl p-6 scholarship-card slide-in`}
                                            style={{ animationDelay: `${idx * 30}ms` }}
                                        >
                                            {/* Header with Tier Badges */}
                                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                                                <div className="flex-1">
                                                    <div className="flex flex-wrap gap-2 mb-2">
                                                        <span className={getTierColor(scholarship.tier)}>
                                                            {getTierLabel(scholarship.tier)}
                                                        </span>
                                                        <span className={`tier-label ${selectivityTier.class}`}>
                                                            {selectivityTier.icon} {selectivityTier.label}
                                                        </span>
                                                    </div>
                                                    <h3 className="text-xl font-display text-gray-900">{scholarship.name}</h3>
                                                    <p className="text-sm text-gray-600 mt-1">{scholarship.description}</p>
                                                </div>
                                                
                                                {/* Selectivity Metrics */}
                                                <div className="md:text-right">
                                                    <div className="match-score">{scholarship.matchScore}%</div>
                                                    <div className="text-xs text-gray-500">Match Score</div>
                                                    <div className="text-xs text-gray-500 mt-2">
                                                        {scholarship.odds}% odds
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Scholarship Details */}
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 text-sm">
                                                <div>
                                                    <span className="text-gray-500">Amount:</span>
                                                    <div className="font-semibold text-purple-600">${scholarship.amount.toLocaleString()}</div>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500">Renewable:</span>
                                                    <div className="font-semibold">{scholarship.renewable ? "✓ Yes" : "✗ No"}</div>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500">Type:</span>
                                                    <div className="font-semibold capitalize">{scholarship.type}</div>
                                                </div>
                                                <div>
                                                    <span className="text-gray-500">Deadline:</span>
                                                    <div className={`font-semibold ${daysLeft <= 0 ? "deadline-urgent" : daysLeft <= 7 ? "deadline-soon" : ""}`}>
                                                        {daysLeft <= 0 ? "PASSED" : `${daysLeft}d`}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Deadline Date Full */}
                                            <div className="mb-4 text-xs text-gray-600">
                                                📅 {scholarship.deadline} (in {daysLeft} days)
                                            </div>
                                            
                                            {/* Application Tracking */}
                                            <div className="space-y-3 pt-3 border-t border-gray-200">
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                                                    <label className="flex items-center gap-2">
                                                        <input
                                                            type="checkbox"
                                                            checked={t.started || false}
                                                            onChange={(e) => handleStatusChange(scholarship.id, "started", e.target.checked)}
                                                            className="w-4 h-4"
                                                        />
                                                        <span>Started</span>
                                                    </label>
                                                    <label className="flex items-center gap-2">
                                                        <input
                                                            type="checkbox"
                                                            checked={t.status === "submitted"}
                                                            onChange={(e) => handleStatusChange(scholarship.id, "status", e.target.checked ? "submitted" : null)}
                                                            className="w-4 h-4"
                                                        />
                                                        <span>Submitted</span>
                                                    </label>
                                                    <label className="flex items-center gap-2">
                                                        <input
                                                            type="checkbox"
                                                            checked={t.heard || false}
                                                            onChange={(e) => handleStatusChange(scholarship.id, "heard", e.target.checked)}
                                                            className="w-4 h-4"
                                                        />
                                                        <span>Heard Back</span>
                                                    </label>
                                                    <select
                                                        value={t.result || ""}
                                                        onChange={(e) => handleStatusChange(scholarship.id, "result", e.target.value || null)}
                                                        className="px-2 py-1 rounded border border-gray-300 text-xs"
                                                    >
                                                        <option value="">Result...</option>
                                                        <option value="won">Won</option>
                                                        <option value="not-selected">Not Selected</option>
                                                        <option value="waitlisted">Waitlisted</option>
                                                    </select>
                                                </div>
                                                
                                                {/* Quick Status Buttons */}
                                                <div className="flex flex-wrap gap-2">
                                                    {["Deadline Passed", "Did Not Submit", "Withdrew", "Reset"].map(btn => (
                                                        <button
                                                            key={btn}
                                                            onClick={() => handleQuickStatus(scholarship.id, btn)}
                                                            className="text-xs px-2 py-1 rounded bg-gray-100 hover:bg-gray-200 text-gray-700 transition"
                                                        >
                                                            {btn}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    
                    {/* Legend */}
                    <div className="max-w-7xl mx-auto mt-12 bg-white rounded-2xl p-6 border border-gray-200">
                        <h3 className="font-display text-lg text-gray-900 mb-4">Understanding Selectivity Tiers</h3>
                        <div className="grid md:grid-cols-3 gap-6">
                            <div className="tier-best rounded-lg p-4">
                                <div className="font-semibold text-green-900 mb-2">🟢 Your Best Bets (60%+ match)</div>
                                <p className="text-sm text-green-800">Higher odds, strong match to Dakota's profile. Prioritize these first.</p>
                            </div>
                            <div className="tier-medium rounded-lg p-4">
                                <div className="font-semibold text-amber-900 mb-2">🟡 Worth Applying (40-60% match)</div>
                                <p className="text-sm text-amber-800">Medium odds, good fit. Apply if time allows.</p>
                            </div>
                            <div className="tier-reach rounded-lg p-4">
                                <div className="font-semibold text-red-900 mb-2">🔴 Reach Opportunities (under 40%)</div>
                                <p className="text-sm text-red-800">Longer shots but worth trying. Lower time investment first.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<ScholarshipApp />);
    </script>
</body>
</html>
