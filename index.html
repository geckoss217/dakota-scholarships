        .tier-medium { background: #fef3c7; color: #713f12; }
        .tier-reach { background: #fee2e2; color: #7f1d1d; }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .slide-in { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { 
            from { 
                opacity: 0;
                transform: translateY(10px);
            } 
            to { 
                opacity: 1;
                transform: translateY(0);
            } 
        }
        
        .scholarship-card {
            transition: all 0.3s ease;
        }
        
        .scholarship-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.15);
        }
        
        .expanded-section {
            background: linear-gradient(135deg, #f0f9ff 0%, #f5f3ff 100%);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-top: 1rem;
            border-left: 4px solid #8b5cf6;
        }
        
        .requirement-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
        }
        
        .requirement-row:last-child {
            border-bottom: none;
        }
        
        .requirement-label {
            font-weight: 600;
            color: #8b5cf6;
            font-size: 0.875rem;
        }
        
        .requirement-value {
            color: #374151;
            font-size: 0.875rem;
        }
        
        .link-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }
        
        .expand-button {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            color: #374151;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .expand-button:hover {
            background: #e5e7eb;
        }
        
        .expand-button.expanded {
            background: #e0e7ff;
            color: #4f46e5;
        }
        
        .deadline-urgent { color: #dc2626; font-weight: 600; }
        .deadline-soon { color: #ea580c; font-weight: 600; }
        
        .effort-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: #fef3c7;
            color: #713f12;
            border-radius: 0.25rem;

        .effort-medium { background: #fef3c7; color: #713f12; }

            return diff;
        }

            switch(effort) {

                case "high": return "effort-high";

            }
        }

            if (matchScore >= 88 && odds <= 25) return { label: "Your Best Bet", class: "tier-best", icon: "🟢" };
            if (matchScore >= 80) return { label: "Worth Applying", class: "tier-medium", icon: "🟡" };
            return { label: "Reach Opportunity", class: "tier-reach", icon: "🔴" };
        }

                                        type="range"
                                        min="0"
                                        max="30000"
                                        step="1000"
                                        value={minAmount}
                                        onChange={(e) => setMinAmount(parseInt(e.target.value))}
                                        className="w-full"
                                    />
                                </div>
                                
                                <div className="flex items-center gap-4">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={showRecommended}
                                            onChange={(e) => setShowRecommended(e.target.checked)}
                                            className="w-5 h-5"
                                        />
                                        <span className="text-sm font-medium text-gray-700">🎯 Recommended (30)</span>
                                    </label>
                                </div>
                                
                                <div className="flex items-center gap-4">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={showAdditional}
                                            onChange={(e) => setShowAdditional(e.target.checked)}
                                            className="w-5 h-5"
                                        />
                                        <span className="text-sm font-medium text-gray-700">🔍 Additional (30)</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Scholarships List */}
                    <div className="max-w-7xl mx-auto">
                        {filteredScholarships.length === 0 ? (
                            <div className="text-center py-12 bg-white rounded-2xl">
                                <p className="text-gray-500 text-lg">No scholarships match your filters.</p>
                            </div>
                        ) : (
                            <div className="grid gap-4">
                                {filteredScholarships.map((scholarship, idx) => (
                                    <ScholarshipCard
                                        key={scholarship.id}
                                        scholarship={scholarship}
                                        expanded={expandedIds.has(scholarship.id)}
                                        onExpand={toggleExpand}
                                    />
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<ScholarshipApp />);
    </script>
</body>
</html>
